<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Beer at a Time</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      display: flex;
      height: 100vh;
      overflow: hidden;
      color: #1c1c1e;
    }

    /* Sidebar */
    #sidebar {
      width: 200px;
      min-width: 200px;
      background: #fff;
      border-right: 1px solid #e5e5ea;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #sidebar h2 {
      font-size: 13px;
      font-weight: 600;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 16px 14px 8px;
    }

    .person-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 14px;
      cursor: pointer;
      border-radius: 8px;
      margin: 1px 6px;
      font-size: 14px;
      transition: background .1s;
    }
    .person-item:hover { background: #f2f2f7; }
    .person-item.active { background: #e8f0fe; font-weight: 600; }

    .person-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Main area */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #toolbar {
      background: #fff;
      border-bottom: 1px solid #e5e5ea;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #toolbar h1 {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
    }

    #search {
      border: 1px solid #d1d1d6;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 14px;
      width: 220px;
      outline: none;
      background: #f2f2f7;
    }
    #search:focus { border-color: #0B84FE; background: #fff; }

    #chat-feed {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* Load older */
    #load-older {
      text-align: center;
      padding: 10px 0 6px;
    }
    #load-older button {
      background: none;
      border: 1px solid #d1d1d6;
      border-radius: 20px;
      padding: 5px 16px;
      font-size: 13px;
      color: #0B84FE;
      cursor: pointer;
    }
    #load-older button:hover { background: #f2f2f7; }
    #load-older.hidden { display: none; }

    /* Date separator */
    .date-sep {
      text-align: center;
      font-size: 12px;
      color: #8e8e93;
      margin: 12px 0 6px;
    }

    /* Message row */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 7px;
      max-width: 75%;
    }
    .msg-row.from-me {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .msg-row.from-them {
      align-self: flex-start;
    }

    /* Avatar */
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
      flex-shrink: 0;
      margin-bottom: 2px;
    }
    .avatar.hidden { visibility: hidden; }

    /* Bubble */
    .bubble-wrap {
      display: flex;
      flex-direction: column;
    }
    .msg-row.from-me .bubble-wrap { align-items: flex-end; }
    .msg-row.from-them .bubble-wrap { align-items: flex-start; }

    .sender-name {
      font-size: 11px;
      color: #8e8e93;
      margin-bottom: 2px;
      padding-left: 2px;
    }

    .bubble {
      padding: 8px 12px;
      font-size: 15px;
      line-height: 1.4;
      word-break: break-word;
      max-width: 100%;
    }
    .msg-row.from-them .bubble {
      background: #e9e9eb;
      color: #1c1c1e;
      border-radius: 18px 18px 18px 4px;
    }
    .msg-row.from-me .bubble {
      background: #0B84FE;
      color: #fff;
      border-radius: 18px 18px 4px 18px;
    }

    .bubble img {
      display: block;
      max-width: 240px;
      max-height: 320px;
      border-radius: 10px;
      cursor: pointer;
      object-fit: cover;
    }
    .bubble img + .bubble-text { margin-top: 6px; }

    .attachment-placeholder {
      font-style: italic;
      opacity: .7;
    }

    .bubble-time {
      font-size: 11px;
      color: #8e8e93;
      margin-top: 3px;
      padding: 0 2px;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 1000;
      align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 6px; }

    #status {
      text-align: center;
      padding: 20px;
      color: #8e8e93;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <h2>People</h2>
  <div class="person-item active" data-name="" onclick="setFilter('')">
    <span class="person-dot" style="background:#8e8e93"></span>
    Everyone
  </div>
</div>

<div id="main">
  <div id="toolbar">
    <h1>🍺 One Beer at a Time</h1>
    <input id="search" type="text" placeholder="Search messages…">
  </div>
  <div id="load-older" class="hidden">
    <button onclick="loadOlder()">Load older messages</button>
  </div>
  <div id="chat-feed">
    <div id="status">Loading…</div>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  const API = 'http://localhost:8000';
  const PAGE = 100;

  const NAMES = ['Avi','Cole','Hunter','Jacob','Joseph','Kacper','Liam','Lucas','Marek','Miggy','Owen'];
  const getHue = name => { const i = NAMES.indexOf(name); return i >= 0 ? i * 28 : 308; };
  const avatarStyle = name => `background:hsl(${getHue(name)},65%,50%)`;

  const state = {
    offset: 0,
    total: 0,
    allMessages: [],   // stored ascending (oldest first)
    filter: { name: '', search: '' },
  };

  // ── Fetch ────────────────────────────────────────────────────────────────

  async function fetchMessages(reset = false) {
    if (reset) {
      state.offset = 0;
      state.allMessages = [];
    }

    let url = `${API}/messages?limit=${PAGE}&offset=${state.offset}&show_reactions=false`;
    if (state.filter.name)   url += `&name=${encodeURIComponent(state.filter.name)}`;
    if (state.filter.search) url += `&search=${encodeURIComponent(state.filter.search)}`;

    let data;
    try {
      const res = await fetch(url);
      data = await res.json();
    } catch (e) {
      document.getElementById('status').textContent = 'Could not reach API — is the server running?';
      return;
    }

    // API returns newest-first; reverse so we store oldest-first
    const incoming = [...data.messages].reverse();
    state.allMessages = reset ? incoming : [...incoming, ...state.allMessages];
    state.total = data.total;
    state.offset += data.messages.length;

    render(reset, incoming.length);
  }

  async function loadOlder() {
    const feed = document.getElementById('chat-feed');
    const anchor = feed.firstElementChild;
    await fetchMessages(false);
    requestAnimationFrame(() => {
      if (anchor) anchor.scrollIntoView({ block: 'start', behavior: 'instant' });
    });
  }

  // ── Render ───────────────────────────────────────────────────────────────

  function render(reset, newCount) {
    const feed = document.getElementById('chat-feed');
    document.getElementById('status').remove && (() => {
      const s = document.getElementById('status');
      if (s) s.remove();
    })();

    const statusEl = document.getElementById('status');
    if (statusEl) statusEl.remove();

    if (state.allMessages.length === 0) {
      feed.innerHTML = '<div id="status">No messages found.</div>';
      document.getElementById('load-older').classList.add('hidden');
      return;
    }

    if (reset) {
      feed.innerHTML = '';
      renderMessageBlock(feed, state.allMessages, 'append');
      // scroll to bottom
      requestAnimationFrame(() => { feed.scrollTop = feed.scrollHeight; });
    } else {
      // prepend older messages at top
      const frag = document.createDocumentFragment();
      const tmp = document.createElement('div');
      renderMessageBlock(tmp, state.allMessages.slice(0, newCount), 'append');
      while (tmp.firstChild) frag.appendChild(tmp.firstChild);
      feed.insertBefore(frag, feed.firstChild);
    }

    // update load-older button
    const btn = document.getElementById('load-older');
    if (state.allMessages.length < state.total) {
      btn.classList.remove('hidden');
      btn.querySelector('button').textContent =
        `Load older (showing ${state.allMessages.length} of ${state.total})`;
    } else {
      btn.classList.add('hidden');
    }
  }

  function renderMessageBlock(container, messages, mode) {
    let lastDate = null;
    let lastSender = null;

    messages.forEach(msg => {
      const dateLabel = formatDateLabel(msg.sent_at);
      if (dateLabel !== lastDate) {
        const sep = document.createElement('div');
        sep.className = 'date-sep';
        sep.textContent = dateLabel;
        container.appendChild(sep);
        lastDate = dateLabel;
        lastSender = null;
      }

      const showName = !msg.is_from_me && msg.name !== lastSender;
      const showAvatar = !msg.is_from_me;
      lastSender = msg.name;

      container.appendChild(buildMessageEl(msg, showName, showAvatar));
    });
  }

  function buildMessageEl(msg, showName, showAvatar) {
    const row = document.createElement('div');
    row.className = `msg-row ${msg.is_from_me ? 'from-me' : 'from-them'}`;

    // avatar
    if (!msg.is_from_me) {
      const av = document.createElement('div');
      av.className = 'avatar' + (showAvatar ? '' : ' hidden');
      av.style.cssText = avatarStyle(msg.name);
      av.textContent = msg.name[0].toUpperCase();
      row.appendChild(av);
    }

    // bubble wrap
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';

    if (showName && !msg.is_from_me) {
      const nameEl = document.createElement('div');
      nameEl.className = 'sender-name';
      nameEl.textContent = msg.name;
      wrap.appendChild(nameEl);
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    // image
    if (msg.has_attachment) {
      const img = document.createElement('img');
      img.src = `${API}/attachment/${msg.rowid}`;
      img.loading = 'lazy';
      img.alt = 'Photo';
      img.onerror = function() {
        this.replaceWith(Object.assign(document.createElement('span'), {
          className: 'attachment-placeholder', textContent: '📷 Photo'
        }));
      };
      img.onclick = e => { e.stopPropagation(); openLightbox(img.src); };
      bubble.appendChild(img);
    }

    // text
    if (msg.text) {
      const textEl = document.createElement('div');
      textEl.className = 'bubble-text';
      textEl.textContent = msg.text;
      bubble.appendChild(textEl);
    }

    // if nothing at all (no text, no attachment flag)
    if (!msg.has_attachment && !msg.text) {
      const textEl = document.createElement('div');
      textEl.className = 'bubble-text attachment-placeholder';
      textEl.textContent = '(empty)';
      bubble.appendChild(textEl);
    }

    wrap.appendChild(bubble);

    const time = document.createElement('div');
    time.className = 'bubble-time';
    time.textContent = formatTime(msg.sent_at);
    wrap.appendChild(time);

    row.appendChild(wrap);
    return row;
  }

  // ── Date formatting ───────────────────────────────────────────────────────

  function parseUTC(sentAt) {
    return new Date(sentAt.replace(' ', 'T') + 'Z');
  }

  function formatDateLabel(sentAt) {
    const d = parseUTC(sentAt);
    const now = new Date();
    const diffDays = Math.floor((now - d) / 86400000);
    if (diffDays === 0) return 'Today';
    if (diffDays === 1) return 'Yesterday';
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  function formatTime(sentAt) {
    const d = parseUTC(sentAt);
    const now = new Date();
    const diffDays = Math.floor((now - d) / 86400000);
    const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    if (diffDays === 0) return timeStr;
    if (diffDays < 7) return d.toLocaleDateString('en-US', { weekday: 'short' }) + ' ' + timeStr;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + timeStr;
  }

  // ── Sidebar ───────────────────────────────────────────────────────────────

  function buildSidebar() {
    const sidebar = document.getElementById('sidebar');
    NAMES.forEach(name => {
      const item = document.createElement('div');
      item.className = 'person-item';
      item.dataset.name = name;
      item.onclick = () => setFilter(name);
      item.innerHTML = `
        <span class="person-dot" style="background:hsl(${getHue(name)},65%,50%)"></span>
        ${name}
      `;
      sidebar.appendChild(item);
    });
  }

  function setFilter(name) {
    state.filter.name = name;
    document.querySelectorAll('.person-item').forEach(el => {
      el.classList.toggle('active', el.dataset.name === name);
    });
    fetchMessages(true);
  }

  // ── Search ────────────────────────────────────────────────────────────────

  let searchTimer = null;
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.filter.search = e.target.value.trim();
      fetchMessages(true);
    }, 300);
  });

  // ── Lightbox ──────────────────────────────────────────────────────────────

  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  // ── Init ──────────────────────────────────────────────────────────────────

  buildSidebar();
  fetchMessages(true);
</script>
</body>
</html>
